        <path d="M244 342L352 122" stroke="black" stroke-width="20" stroke-linecap="round" fill="none"/>
        <path d="M207 325L274 359L265 374L198 340Z"/>
        <path d="M114 330C143 353 180 350 216 328C249 334 277 357 293 387C264 418 214 426 166 405C139 393 120 366 114 330Z"/>
