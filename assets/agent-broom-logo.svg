<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Agent Broom frosted glass logo</title>
  <defs>
    <linearGradient id="glass" x1="34" y1="18" x2="480" y2="498" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF3E3" stop-opacity="0.96"/>
      <stop offset="0.45" stop-color="#FFD49A" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#F59B38" stop-opacity="0.56"/>
    </linearGradient>
    <linearGradient id="edge" x1="34" y1="22" x2="478" y2="492" gradientUnits="userSpaceOnUse">
